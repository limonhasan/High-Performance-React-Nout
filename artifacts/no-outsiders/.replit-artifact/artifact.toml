kind = "web"
previewPath = "/"
title = "NO OUTSIDERS"
version = "1.0.0"
id = "artifacts/no-outsiders"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18450

[services.development]
run = "pnpm --filter @workspace/no-outsiders run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/no-outsiders", "run", "build" ]
publicDir = "artifacts/no-outsiders/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18450"
BASE_PATH = "/"
